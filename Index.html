<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL_v2.1_STABLE</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap');

        :root {
            --bg: #030303;
            --panel: #080808;
            --accent: #00ff41;
            --accent-dim: rgba(0, 255, 65, 0.1);
            --error: #ff3333;
            --text-dim: #444;
            --text-mid: #888;
            --text-bright: #eee;
            --border: #151515;
            --font-main: 'Fira Mono', monospace;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg); 
            color: var(--text-mid); 
            font-family: var(--font-main); 
            height: 100vh; 
            height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            font-size: 14px; 
        }

        html { height: -webkit-fill-available; }

        /* Intro Screen */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            cursor: pointer;
            transition: opacity 0.8s ease-out;
        }

        #intro-text {
            max-width: 600px;
            color: var(--accent);
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
            min-height: 1.6em;
            text-shadow: 0 0 5px var(--accent-dim);
        }

        #intro-text::after {
            content: '_';
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Authorization Screen */
        #auth-container { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 9999; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }

        .auth-box { 
            width: 100%; 
            max-width: 360px; 
            padding: 30px; 
            border: 1px solid var(--border); 
            background: var(--panel); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .auth-box h1 { 
            font-size: 13px; 
            color: var(--accent); 
            margin-bottom: 25px; 
            text-align: center; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            color: var(--accent); 
            padding: 15px; 
            margin-bottom: 15px; 
            outline: none; 
            font-family: var(--font-main); 
            font-size: 14px; 
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn-access { 
            width: 100%; 
            padding: 15px; 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            cursor: pointer; 
            font-family: var(--font-main); 
            font-weight: bold; 
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-access:hover { background: var(--accent-dim); }
        .btn-access:active { background: var(--accent); color: #000; }

        .switch-mode { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 11px; 
            cursor: pointer; 
            color: var(--text-dim); 
            text-decoration: underline;
        }

        /* Main Interface */
        #chat-interface { 
            display: none; 
            width: 100%; 
            height: 100vh; 
            flex-direction: column; 
        }

        header { 
            height: 50px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #050505;
            flex-shrink: 0;
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }
        
        .msg-row { max-width: 85%; display: flex; flex-direction: column; }
        .msg-own { align-self: flex-end; align-items: flex-end; }
        .msg-meta { font-size: 10px; color: var(--accent); margin-bottom: 4px; opacity: 0.7; }
        .msg-body { 
            background: var(--panel); 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 0 12px 12px 12px; 
            color: var(--text-bright); 
            line-height: 1.5; 
            word-break: break-word; 
            font-size: 13px;
        }
        .msg-own .msg-body { 
            border-color: var(--accent-dim); 
            border-radius: 12px 0 12px 12px; 
            background: #0a110a; 
        }

        .input-wrap { 
            padding: 10px 15px 25px 15px; 
            background: var(--bg); 
            border-top: 1px solid var(--border); 
            flex-shrink: 0;
        }

        .input-container { 
            display: flex; 
            border: 1px solid var(--border); 
            background: #000; 
            border-radius: 4px; 
            overflow: hidden; 
        }

        #message-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 12px; 
            color: #fff; 
            outline: none; 
            font-family: var(--font-main); 
            font-size: 14px; 
            margin-bottom: 0;
        }

        .send-btn { 
            background: transparent; 
            border: none; 
            color: var(--accent); 
            padding: 0 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
        }

        .status-bar { 
            font-size: 9px; 
            padding: 5px 15px; 
            background: #000; 
            border-top: 1px solid var(--border); 
            color: var(--accent); 
            display: flex; 
            justify-content: space-between; 
            flex-shrink: 0;
        }

        /* Scrollbar */
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="intro-text">დააჭირეთ დასაწყებად...</div>
    </div>

    <div id="auth-container">
        <div class="auth-box">
            <h1 id="auth-title">სისტემური_ავტორიზაცია</h1>
            <input type="email" id="email" placeholder="ელ-ფოსტა" autocomplete="email">
            <input type="password" id="password" placeholder="პაროლი">
            <button class="btn-access" id="auth-btn">შესვლა</button>
            <div class="switch-mode" id="mode-text">ახალი ანგარიშის შექმნა</div>
        </div>
    </div>

    <div id="chat-interface">
        <header>
            <div id="user-display" style="font-size: 11px; color: var(--accent); font-weight: bold;">NODE://INITIALIZING</div>
            <button id="logout-btn" style="background:none; border:1px solid var(--error); color:var(--error); padding:4px 10px; cursor:pointer; font-family:var(--font-main); font-size:10px; text-transform: uppercase;">Exit</button>
        </header>
        <div id="messages"></div>
        <form id="chat-form" class="input-wrap">
            <div class="input-container">
                <input type="text" id="message-input" placeholder="შეიყვანეთ ბრძანება..." autocomplete="off">
                <button type="submit" class="send-btn"><span class="material-icons">terminal</span></button>
            </div>
        </form><br><br><br>
        <div class="status-bar">
            <span>STATUS: ONLINE</span>
            <span>PING: <span id="ping">24</span>ms</span>
            <span>ENC: AES-256-GCM</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCETpu3LoTDGwfm6pYVGSbEziF9BayBCbM",
            authDomain: "gen-lang-client-0425344551.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0425344551-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gen-lang-client-0425344551",
            appId: "1:518418061437:web:1a292173b6ec172324b914"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const introOverlay = document.getElementById('intro-overlay');
        const introText = document.getElementById('intro-text');
        const fullText = "უბრალოდ ციფრი ხარ სისტემაში. არც სახელი, არც კვალი... არაფერი, რაც სამყაროსთან დაგაკავშირებდა. ჩვენ იქ ვართ, სადაც ინტერნეტი მთავრდება და მხოლოდ სუფთა, ხელშეუხებელი თავისუფლება იწყება.";
        
        let audioCtx;
        function playKeySound() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        let charIndex = 0;
        let isTyping = false;
        function typeWriter() {
            if (charIndex < fullText.length) {
                isTyping = true;
                introText.innerText = fullText.substring(0, charIndex + 1);
                playKeySound();
                charIndex++;
                setTimeout(typeWriter, Math.random() * 40 + 30);
            } else {
                setTimeout(() => {
                    introOverlay.style.opacity = '0';
                    setTimeout(() => {
                        introOverlay.style.display = 'none';
                        if(!auth.currentUser) document.getElementById('auth-container').style.display = 'flex';
                    }, 800);
                }, 1500);
            }
        }

        introOverlay.addEventListener('click', () => {
            if(!isTyping) {
                introText.innerText = "";
                typeWriter();
            }
        });

        let isLogin = true;
        document.getElementById('mode-text').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'სისტემური_ავტორიზაცია' : 'ახალი_კვანძის_შექმნა';
            document.getElementById('auth-btn').innerText = isLogin ? 'შესვლა' : 'რეგისტრაცია';
            document.getElementById('mode-text').innerText = isLogin ? 'ახალი ანგარიშის შექმნა' : 'უკვე გაქვთ ანგარიში?';
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("შეავსეთ ველები");
            
            try {
                if(isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch(e) { alert("შეცდომა: " + e.message); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
                document.getElementById('user-display').innerText = `NODE://${user.email.split('@')[0].toUpperCase()}`;
                loadMessages();
            }
        });

        let messageListener = null;
        function loadMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            if(messageListener) return;

            const chatRef = query(ref(db, 'global_chat'), limitToLast(50));
            messageListener = onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                if(!data) return;
                const isOwn = data.uid === auth.currentUser?.uid;
                const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-row ${isOwn ? 'msg-own' : ''}`;
                msgDiv.innerHTML = `
                    <div class="msg-meta">${data.sender.toUpperCase()} • ${time}</div>
                    <div class="msg-body">${escapeHTML(data.text)}</div>
                `;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            });
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const val = input.value.trim();
            if(!val || !auth.currentUser) return;
            
            input.value = '';
            try {
                await push(ref(db, 'global_chat'), {
                    uid: auth.currentUser.uid,
                    sender: auth.currentUser.email.split('@')[0],
                    text: val,
                    timestamp: serverTimestamp()
                });
            } catch(err) {
                console.error(err);
                alert("გაგზავნა ვერ მოხერხდა");
            }
        };

        setInterval(() => { 
            document.getElementById('ping').innerText = Math.floor(Math.random()*15+15); 
        }, 4000);
    </script>
</body>
</html>
