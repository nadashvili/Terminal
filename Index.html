<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ტერმინალი_v2.0</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* მხოლოდ ერთი ფონტი მთელი საიტისთვის */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap');

        :root {
            --bg: #030303; --panel: #080808; --accent: #00ff41; --accent-dim: rgba(0, 255, 65, 0.15);
            --error: #ff3333; --text-dim: #444; --text-mid: #888; --text-bright: #eee;
            --border: #151515
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
           @font-face {
            font-family: 'GeoGrotesk';
            src: url('gugeshashvili_8_mthavruli_bold-52145488073.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
             font-family: 'GeoGrotesk';
            scroll-behavior: smooth;
        }
        body { background: var(--bg); color: var(--text-mid); font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; }
        
        /* ავტორიზაციის ეკრანი */
        #auth-container { position: fixed; inset: 0; background: #030303; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 360px; padding: 30px; border: 1px solid var(--border); background: var(--panel); position: relative; }
        .auth-box h1 { font-size: 14px; color: var(--accent); margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 15px; margin-bottom: 15px; outline: none; font-family: var(--font-main); font-size: 16px; }
        .btn-access { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-family: var(--font-main); font-weight: bold; }
        .btn-access:active { background: var(--accent); color: #000; }
        .switch-mode { text-align: center; margin-top: 20px; font-size: 11px; cursor: pointer; color: var(--text-dim); }

        /* მთავარი ინტერფეისი */
        #chat-interface { display: none; width: 100%; height: 100vh; flex-direction: column; }
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #050505; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* მესიჯების სტილი */
        .msg-row { max-width: 90%; }
        .msg-own { align-self: flex-end; }
        .msg-meta { font-size: 9px; color: var(--accent); margin-bottom: 4px; }
        .msg-body { background: var(--panel); padding: 12px; border: 1px solid var(--border); border-radius: 0 10px 10px 10px; color: var(--text-bright); line-height: 1.4; word-break: break-word; }
        .msg-own .msg-body { border-color: var(--accent-dim); border-radius: 10px 0 10px 10px; }

        /* ინპუტის ზონა */
        .input-wrap { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-container { display: flex; border: 1px solid var(--border); background: #000; border-radius: 5px; overflow: hidden; }
        #message-input { flex: 1; background: transparent; border: none; padding: 15px; color: #fff; outline: none; font-family: var(--font-main); font-size: 16px; }
        .send-btn { background: transparent; border: none; color: var(--accent); padding: 0 15px; cursor: pointer; }

        /* სტატუს ბარი მობილურისთვის */
        .status-bar { font-size: 10px; padding: 5px 15px; background: var(--panel); border-bottom: 1px solid var(--border); color: var(--text-dim); display: flex; gap: 15px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <h1 id="auth-title">სისტემური_ავტორიზაცია</h1>
            <input type="email" id="email" placeholder="ელ-ფოსტა" autocomplete="email">
            <input type="password" id="password" placeholder="პაროლი">
            <button class="btn-access" id="auth-btn">შესვლა</button>
            <div class="switch-mode" id="mode-text">ახალი ანგარიშის შექმნა</div>
        </div>
    </div>

    <div id="chat-interface">
        <div class="status-bar">
            <span>სტატუსი: ონლაინ</span>
            <span>პინგი: <span id="ping">--</span>მს</span>
        </div>
        <header>
            <div id="user-display" style="font-size: 11px; color: var(--accent);">კვანძი://უცნობი</div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--error); padding:5px 10px; cursor:pointer; font-family:var(--font-main); font-size:9px;">გამოსვლა</button>
        </header>
        <div id="messages"></div>
        <form id="chat-form" class="input-wrap">
            <div class="input-container">
                <input type="text" id="message-input" placeholder="დაწერეთ შეტყობინება..." autocomplete="off">
                <button type="submit" class="send-btn"><span class="material-icons">send</span></button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCETpu3LoTDGwfm6pYVGSbEziF9BayBCbM",
            authDomain: "gen-lang-client-0425344551.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0425344551-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gen-lang-client-0425344551",
            appId: "1:518418061437:web:1a292173b6ec172324b914"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let isLogin = true;

        document.getElementById('mode-text').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'სისტემური_ავტორიზაცია' : 'რეგისტრაცია';
            document.getElementById('auth-btn').innerText = isLogin ? 'შესვლა' : 'შექმნა';
            document.getElementById('mode-text').innerText = isLogin ? 'ახალი ანგარიშის შექმნა' : 'უკვე გაქვთ ანგარიში?';
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return;
            try {
                if(isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch(e) { alert("წვდომა უარყოფილია: " + e.code); }
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
                document.getElementById('user-display').innerText = `კვანძი://${user.email.split('@')[0].toUpperCase()}`;
                loadMessages();
            }
        });

        function loadMessages() {
            const chatRef = query(ref(db, 'global_chat'), limitToLast(30));
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const isOwn = data.uid === auth.currentUser.uid;
                const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                const msgHtml = `
                    <div class="msg-row ${isOwn ? 'msg-own' : ''}">
                        <div class="msg-meta">${data.sender} • ${time}</div>
                        <div class="msg-body">${data.text}</div>
                    </div>
                `;
                const container = document.getElementById('messages');
                container.insertAdjacentHTML('beforeend', msgHtml);
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            if(!input.value.trim()) return;

            const text = input.value;
            input.value = '';
            
            await push(ref(db, 'global_chat'), {
                uid: auth.currentUser.uid,
                sender: auth.currentUser.email.split('@')[0],
                text: text,
                timestamp: serverTimestamp()
            });
        };

        setInterval(() => { document.getElementById('ping').innerText = Math.floor(Math.random()*15 + 15); }, 3000);
    </script>
</body>
</html>
